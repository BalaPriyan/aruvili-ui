[package]
name = "aruviliui-cli"
version = "0.1.0"
edition = "2021"
authors = ["BalaPriyan <hello@aruvili.com>"]
description = "CLI for Aruvili UI - Initialize projects and add components."

[dependencies]
# Argument parsing
clap = { version = "4.4", features = ["derive"] }
# Interactive prompts
dialoguer = "0.11"
# Progress bars and spinners
indicatif = "0.17"
# HTTP client for fetching the registry
reqwest = { version = "0.11", features = ["json"] }
# Async runtime
tokio = { version = "1.0", features = ["full"] }
# JSON serialization/deserialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# Terminal styling
console = "0.15"
# Error handling
anyhow = "1.0"
# File system utilities
fs_extra = "1.3"
# Path manipulation
path-clean = "1.0"
